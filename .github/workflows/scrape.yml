name: scrape & aggregate

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:        # 手动触发

permissions:
  contents: write           # 提交回 data/*.json

concurrency:
  group: scrape
  cancel-in-progress: false  # 串行，避免 git 冲突

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Scrape sources
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 抓取相关 secret 在 Cowork / GitHub repo settings 里加：
          # WEIBO_COOKIE / X_BEARER / TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
        run: |
          python -m scrapers.exchange_rate
          python -m scrapers.rsshub_weibo  || echo "weibo skipped"
          python -m scrapers.brand_lv      || echo "lv skipped"
          python -m scrapers.mercari       || echo "mercari skipped"

      - name: Aggregate
        run: python -m aggregator.compute

      - name: Notify on target hit
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m notifier.telegram || true

      - name: Commit data updates
        run: |
          git config user.name  "qumai-bot"
          git config user.email "qumai-bot@users.noreply.github.com"
          git add data/ snapshots/ || true
          if ! git diff --cached --quiet; then
            git commit -m "data: scheduled update $(date -u +%FT%TZ)"
            git push
          else
            echo "No data changes"
          fi
