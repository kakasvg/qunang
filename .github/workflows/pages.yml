name: deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'snapshots/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 把 data/ 和 snapshots/ 拷进 site/，让静态站能直接读
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data _site/snapshots
          cp -r data/*       _site/data/       2>/dev/null || true
          cp -r snapshots/*  _site/snapshots/  2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
